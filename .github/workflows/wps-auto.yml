name: WPS Auto Click
on:
  schedule:
    - cron: '0 18 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  run_task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 缓存npm依赖
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      # 缓存pw浏览器，key绑定pw版本，版本变动自动重下
      - name: Cache PW Browser
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('node_modules/playwright/package.json','package.json') }}

      - name: Install npm
        run: npm ci

      # 关键：统一安装 chromium（含headless-shell，不用单独chrome）
      - name: Install playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run script
        env:
          WPS_COOKIES: ${{ secrets.WPS_COOKIES }}
        run: node auto-click.js
